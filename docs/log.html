<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log | Clark</title>
  <meta name="description" content="Full telemetry log of Clark field observations, signals, changes, and corrections.">
  <link rel="stylesheet" href="styles.css">
</head>
<body data-page="updates">
  <div class="shell">
    <header class="topbar">
      <div class="brand">
        <div class="mark"><img src="images/clark-c.jpg" alt="Clark logo"></div>
        <div>
          <div class="site-title">CLARK</div>
          <small>Full log</small>
        </div>
      </div>
      <div class="meta">
        <span>Field</span>
        <span>Signals</span>
        <span>Changes</span>
        <span>Corrections</span>
      </div>
    </header>

    <nav class="nav" aria-label="Main">
      <a data-nav-page="home" href="index.html">Home</a>
      <a data-nav-page="why" href="why-clark.html">Why Clark</a>
      <a data-nav-page="method" href="method.html">Learning &amp; Working</a>
      <a data-nav-page="node" href="node-one.html">Niagara Assembly Centre</a>
      <a data-nav-page="evidence" href="evidence.html">Evidence</a>
      <a data-nav-page="library" href="docs/index.html">Library</a>
      <a data-nav-page="participate" href="participate.html">Participate</a>
    </nav>

    <main>
      <section class="section">
        <div class="eyebrow"><a href="updates.html">Back to Updates</a></div>
        <h2>Full log</h2>
        <p class="lead">Every field observation, signal, change, and correction in chronological order.</p>

        <div class="log-filter-bar">
          <button class="log-filter-btn active" data-filter="all">All</button>
          <button class="log-filter-btn" data-filter="field">Field</button>
          <button class="log-filter-btn" data-filter="signal">Signal</button>
          <button class="log-filter-btn" data-filter="change">Change</button>
          <button class="log-filter-btn" data-filter="correction">Correction</button>
        </div>
      </section>

      <section class="section">
        <div id="full-log" class="log-feed"></div>
      </section>
    </main>
  </div>
  <script src="updates-data.js"></script>
  <script>
  (function() {
    function esc(s) { var d = document.createElement("div"); d.textContent = s; return d.innerHTML; }

    var logEl = document.getElementById("full-log");
    var activeFilter = "all";

    function renderLog() {
      var entries = (typeof CLARK_LOG !== "undefined" ? CLARK_LOG : []);
      var filtered = activeFilter === "all" ? entries : entries.filter(function(e) { return e.type === activeFilter; });

      logEl.innerHTML = filtered.map(function(e, i) {
        return '<div class="log-entry" data-log-idx="' + i + '">' +
          '<span class="log-date">' + esc(e.date) + '</span>' +
          '<span class="log-badges">' +
            '<span class="log-type-badge ' + esc(e.type) + '">' + esc(e.type) + '</span>' +
            (e.initiative ? '<span class="log-initiative-badge">' + esc(e.initiative) + '</span>' : '') +
          '</span>' +
          '<span class="log-text">' + esc(e.text) + '</span>' +
        '</div>';
      }).join("");

      if (filtered.length === 0) {
        logEl.innerHTML = '<p class="fineprint">No entries for this filter.</p>';
      }
    }

    renderLog();

    // Filter buttons
    document.querySelectorAll(".log-filter-btn").forEach(function(btn) {
      btn.addEventListener("click", function() {
        document.querySelectorAll(".log-filter-btn").forEach(function(b) { b.classList.remove("active"); });
        btn.classList.add("active");
        activeFilter = btn.getAttribute("data-filter");
        renderLog();
      });
    });

    // Click to overlay
    logEl.addEventListener("click", function(e) {
      var row = e.target.closest(".log-entry");
      if (!row) return;
      var entries = (typeof CLARK_LOG !== "undefined" ? CLARK_LOG : []);
      var filtered = activeFilter === "all" ? entries : entries.filter(function(en) { return en.type === activeFilter; });
      var idx = parseInt(row.getAttribute("data-log-idx"), 10);
      var entry = filtered[idx];
      if (!entry) return;

      var overlay = document.createElement("div");
      overlay.className = "md-overlay";
      overlay.innerHTML =
        '<div class="md-overlay-panel">' +
          '<div class="md-overlay-bar">' +
            '<span class="md-title">Log entry</span>' +
            '<button class="md-close">Close</button>' +
          '</div>' +
          '<div class="md-overlay-body">' +
            '<div class="log-overlay-meta">' +
              '<div class="log-meta-item"><strong>Date</strong>' + esc(entry.date) + '</div>' +
              '<div class="log-meta-item"><strong>Type</strong>' + esc(entry.type) + '</div>' +
              (entry.initiative ? '<div class="log-meta-item"><strong>Initiative</strong>' + esc(entry.initiative) + '</div>' : '') +
              (entry.strategic ? '<div class="log-meta-item"><strong>Strategic</strong>' + esc(entry.strategic) + '</div>' : '') +
            '</div>' +
            '<p style="font-size:1.1rem;color:var(--ink)">' + esc(entry.text) + '</p>' +
          '</div>' +
        '</div>';
      document.body.appendChild(overlay);
      requestAnimationFrame(function() { overlay.classList.add("visible"); });

      function close() {
        overlay.classList.remove("visible");
        setTimeout(function() { overlay.remove(); }, 200);
      }
      overlay.querySelector(".md-close").addEventListener("click", close);
      overlay.addEventListener("click", function(ev) { if (ev.target === overlay) close(); });
      document.addEventListener("keydown", function handler(ev) {
        if (ev.key === "Escape") { close(); document.removeEventListener("keydown", handler); }
      });
    });
  })();
  </script>
  <script src="app.js"></script>
</body>
</html>
